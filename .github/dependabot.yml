# Dependabot keeps dependencies and pinned action SHAs current. The SHA pins in
# the workflows are immutable (supply-chain safe) but can go stale and miss a
# security patch; Dependabot bumping the github-actions ecosystem is the control
# that keeps those pins fresh. Go modules are watched in all four module dirs.
#
# cooldown delays *version* updates for newly published releases so a freshly
# compromised package/action is not adopted on day zero. It does NOT delay
# security updates - those still arrive immediately.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      gomod-root:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: "/transport/mcpauth"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      gomod-transport-mcpauth:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: "/audit/otel"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      gomod-audit-otel:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: "/dpop/redisreplay"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      gomod-dpop-redisreplay:
        patterns: ["*"]
        update-types: [minor, patch]
