# Dependency review: on every pull request, diff the dependency manifests
# (go.mod / go.sum) and BLOCK the PR if it introduces a dependency with a known
# vulnerability at or above the configured severity, or a disallowed license.
# This catches a bad dependency before it is ever merged or tagged.
name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          show-openssf-scorecard: true
          # Block on copyleft licenses that are incompatible with this MIT library.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0
