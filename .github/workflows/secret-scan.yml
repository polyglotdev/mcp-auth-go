# Secret scanning with the gitleaks CLI over the full git history.
#
# We use the MIT-licensed gitleaks binary (github.com/zricethezav/gitleaks/v8),
# installed via `go install ...@v8.30.1` and verified through the Go checksum
# database. We deliberately do NOT use gitleaks-action, which ships under a
# commercial end-user license - the wrapper is not worth the licensing surface
# for an open library when the tool itself is free and verifiable.
#
# Policy: BLOCKING. A detected secret fails the run. Output is redacted so the
# secret value never appears in logs. This complements GitHub's native push
# protection rather than replacing it.
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Check out (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan git history for secrets
        run: gitleaks git --redact --verbose --exit-code 1 .
